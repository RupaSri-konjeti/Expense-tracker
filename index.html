<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Expense Tracker</h2>

<div class="container">

    <!-- Add Transaction FIRST -->
    <h3>Add Transaction</h3>
    <form id="form">
        <input type="text" id="text" placeholder="Enter description" required>
        <input type="number" id="amount" placeholder="Enter amount (+/-)" required>
        <button>Add</button>
    </form>

    <!-- Balance Section -->
    <h3>Your Balance</h3>
    <h1 id="balance">₹0</h1>

    <div class="inc-exp">
        <div>
            <h4>Income</h4>
            <p id="money-plus">₹0</p>
        </div>
        <div>
            <h4>Expense</h4>
            <p id="money-minus">₹0</p>
        </div>
    </div>

    <!-- Show/Hide History Button -->
    <button onclick="toggleHistory()">Show History</button>

    <!-- History Section (hidden initially) -->
    <div id="history-section" style="display:none;">
        <h3>History</h3>
        <ul id="list"></ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
